  <!-- Small accent dots (like seeds/soil organisms) -->
  <circle cx="48" cy="76" r="1.2" fill="#8B6914" opacity="0.4"/>
  <circle cx="72" cy="74" r="1" fill="#8B6914" opacity="0.35"/>
  <circle cx="55" cy="80" r="0.8" fill="#8B6914" opacity="0.3"/>
  <circle cx="67" cy="79" r="1.1" fill="#8B6914" opacity="0.35"/>

  <circle cx="60" cy="60" r="50" stroke="#2D5016" stroke-width="0.8" fill="none"/>
  
  <!-- Soil layers at bottom -->
  <path d="M25 72 C35 69, 45 74, 60 70 C75 66, 85 72, 95 69" stroke="#8B6914" stroke-width="1.2" fill="none" opacity="0.5"/>

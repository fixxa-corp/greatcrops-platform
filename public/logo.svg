  <!-- Individual leaves -->
  <path d="M60 50 C54 44, 42 38, 38 30 C42 32, 54 36, 60 44" fill="#2D5016" opacity="0.85"/>
  <path d="M60 50 C66 44, 78 38, 82 30 C78 32, 66 36, 60 44" fill="#3A6B1E" opacity="0.75"/>
  <path d="M60 48 C56 40, 46 32, 44 24 C48 28, 56 34, 60 42" fill="#3A6B1E" opacity="0.65"/>
  <path d="M60 48 C64 40, 74 32, 76 24 C72 28, 64 34, 60 42" fill="#2D5016" opacity="0.7"/>
  <path d="M58 46 C52 36, 48 28, 50 20 C52 26, 56 34, 58 42" fill="#4A8C2A" opacity="0.6"/>
  <path d="M62 46 C68 36, 72 28, 70 20 C68 26, 64 34, 62 42" fill="#4A8C2A" opacity="0.55"/>
  
